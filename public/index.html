<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deteksi Hoaks Berita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-container">
      <section class="card input-section">
        <h1>Deteksi Hoaks Berita</h1>
        <p class="subtitle">
          Masukkan teks berita multi paragraf untuk melihat highlight kalimat hoaks/fakta.
        </p>

        <textarea
          id="newsText"
          rows="12"
          placeholder="Tempel teks berita di sini..."
        ></textarea>

        <div id="inputStats" class="input-stats">
          <span id="statParagraphs">Paragraf: 0</span>
          <span id="statSentences">Kalimat: 0</span>
          <span id="statWords">Kata: 0</span>
        </div>

        <div class="action-row">
          <button id="detectBtn" type="button" class="btn btn-primary">
            <span id="detectLabel">Deteksi</span>
            <span id="detectSpinner" class="spinner hidden" aria-hidden="true"></span>
          </button>
          <button id="resetBtn" type="button" class="btn btn-secondary">Reset</button>
        </div>
      </section>

      <section id="errorBox" class="card error-box hidden" role="alert"></section>

      <section id="outputSection" class="card output-section hidden">
        <h2>Hasil Highlight Inline</h2>
        <p id="globalSummary" class="global-summary"></p>
        <div id="outputParagraphs" class="paragraph-list"></div>
      </section>

      <details id="confidenceDetails" class="card confidence-section hidden">
        <summary id="confidenceSummary">Rincian Keyakinan</summary>
        <ul id="confidenceList" class="confidence-list"></ul>
      </details>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
